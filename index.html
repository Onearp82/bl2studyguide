<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Law II — Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1a1612;
    --ink-soft:#5a5048;
    --paper:#f4efe6;
    --paper-warm:#ebe4d6;
    --card:#fdfaf3;
    --line:#d9cfbd;
    --line-soft:#e6ddc9;
    --accent:#6c5ce7;
    --accent-deep:#4a3fb8;
    --accent-soft:#ede9fe;
    --gold:#b8860b;
  }
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(184,134,11,.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(108,92,231,.04) 0%, transparent 50%);
  }

  header{
    background:var(--card);
    border-bottom:1px solid var(--line);
    padding:18px 32px 16px;
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(8px);
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 4px 20px -8px rgba(26,22,18,.08);
  }
  .header-inner{
    max-width:1400px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:18px;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .monogram{
    width:46px;height:46px;
    background:var(--ink);
    color:var(--paper);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;
    font-weight:900;font-size:22px;
    font-style:italic;
    letter-spacing:-.02em;
    border-radius:2px;
    box-shadow:3px 3px 0 var(--accent);
    position:relative;
  }
  .monogram::after{
    content:'';position:absolute;inset:2px;
    border:1px solid rgba(244,239,230,.2);
  }
  .brand-text h1{
    font-family:'Fraunces',serif;
    font-size:22px;font-weight:600;
    letter-spacing:-.02em;line-height:1;
    font-variation-settings:'opsz' 144;
  }
  .brand-text h1 em{
    font-style:italic;font-weight:500;
    color:var(--accent-deep);
  }
  .brand-text .meta{
    font-size:10px;font-weight:500;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.18em;
    margin-top:5px;
    display:flex;align-items:center;gap:8px;
  }
  .brand-text .meta::before{
    content:'';width:18px;height:1px;background:var(--gold);
  }

  nav{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
  .nav-btn{
    padding:10px 18px;
    font-family:'Fraunces',serif;
    font-size:14px;font-weight:500;
    border:1px solid transparent;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .25s cubic-bezier(.2,.8,.2,1);
    border-radius:2px;
    position:relative;
    letter-spacing:.01em;
  }
  .nav-btn .num{
    font-style:italic;
    font-weight:600;
    color:var(--accent);
    margin-right:5px;
    transition:color .25s;
  }
  .nav-btn:hover{
    color:var(--ink);
    background:var(--paper-warm);
  }
  .nav-btn.active{
    color:var(--paper);
    background:var(--ink);
  }
  .nav-btn.active .num{
    color:#a59bf0;
  }

  main{flex:1;display:flex;flex-direction:column;position:relative;padding:24px 32px 32px;max-width:1400px;width:100%;margin:0 auto}
  .page-meta{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:14px;padding:0 4px;flex-wrap:wrap;gap:8px;
  }
  .page-title{
    font-family:'Fraunces',serif;
    font-size:32px;font-weight:600;
    letter-spacing:-.02em;line-height:1;
    font-variation-settings:'opsz' 144;
  }
  .page-title em{font-style:italic;color:var(--accent-deep);font-weight:500}
  .page-sub{
    font-size:11px;font-weight:500;
    color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.16em;
  }
  .page-sub span{color:var(--accent);font-weight:600}

  .frame-wrap{
    flex:1;position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,.7) inset,
      0 1px 2px rgba(26,22,18,.04),
      0 12px 40px -16px rgba(26,22,18,.18);
    min-height:600px;
  }
  .frame-wrap::before,.frame-wrap::after{
    content:'';position:absolute;width:14px;height:14px;
    border:1.5px solid var(--accent);
    z-index:5;pointer-events:none;
  }
  .frame-wrap::before{top:8px;left:8px;border-right:none;border-bottom:none}
  .frame-wrap::after{bottom:8px;right:8px;border-left:none;border-top:none}

  iframe{
    width:100%;height:100%;border:0;display:block;
    position:absolute;inset:0;
    background:#fff;
    opacity:0;transition:opacity .35s ease;
  }
  iframe.loaded{opacity:1}

  .loader{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--card);
    color:var(--ink-soft);
    pointer-events:none;
    z-index:2;
    transition:opacity .25s;
  }
  .loader.hidden{opacity:0}
  .loader-mark{
    font-family:'Fraunces',serif;
    font-size:42px;font-style:italic;font-weight:500;
    color:var(--accent);
    margin-bottom:10px;
    animation:pulse 1.4s ease-in-out infinite;
  }
  .loader-text{
    font-size:10px;text-transform:uppercase;letter-spacing:.22em;
  }
  @keyframes pulse{
    0%,100%{opacity:.35;transform:scale(.98)}
    50%{opacity:1;transform:scale(1)}
  }

  footer{
    text-align:center;
    padding:18px 24px 22px;
    border-top:1px solid var(--line-soft);
    margin-top:8px;
  }
  .footer-rule{
    display:flex;align-items:center;justify-content:center;gap:14px;
    font-family:'Fraunces',serif;font-style:italic;
    font-size:12px;color:var(--ink-soft);
  }
  .footer-rule::before,.footer-rule::after{
    content:'';width:40px;height:1px;background:var(--line);
  }
  .footer-mark{color:var(--accent);font-weight:600}

  header,main{animation:fadeUp .6s ease-out backwards}
  main{animation-delay:.1s}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media (max-width:760px){
    header{padding:14px 18px}
    main{padding:18px 16px 24px}
    .page-title{font-size:24px}
    .nav-btn{padding:8px 12px;font-size:13px}
    .brand-text h1{font-size:18px}
    .monogram{width:40px;height:40px;font-size:19px}
  }
  @media (max-width:520px){
    .header-inner{flex-direction:column;align-items:flex-start}
    nav{width:100%;justify-content:flex-start}
  }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="monogram">B</div>
        <div class="brand-text">
          <h1>Business Law <em>II</em></h1>
          <div class="meta">A Semester Study Companion</div>
        </div>
      </div>
      <nav id="nav">
        <button class="nav-btn active" data-src="Week_1-4.html" data-range="1–4"><span class="num">I.</span>Weeks 1–4</button>
        <button class="nav-btn" data-src="Week_5-8.html" data-range="5–8"><span class="num">II.</span>Weeks 5–8</button>
        <button class="nav-btn" data-src="Week_10-12.html" data-range="10–12"><span class="num">III.</span>Weeks 10–12</button>
        <button class="nav-btn" data-src="Wk13-16.html" data-range="13–16"><span class="num">IV.</span>Weeks 13–16</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-meta">
      <div class="page-title">Part <em id="part-num">One</em></div>
      <div class="page-sub">Currently Reading · <span id="range-label">Weeks 1–4</span></div>
    </div>
    <div class="frame-wrap">
      <div class="loader" id="loader">
        <div class="loader-mark">B</div>
        <div class="loader-text">Loading study guide</div>
      </div>
      <iframe id="frame" src="Week_1-4.html" title="Study Guide"></iframe>
    </div>
  </main>

  <footer>
    <div class="footer-rule">
      <span>compiled with care</span>
      <span class="footer-mark">✦</span>
      <span>bookmark to return</span>
    </div>
  </footer>

<script>
  const frame = document.getElementById('frame');
  const loader = document.getElementById('loader');
  const buttons = document.querySelectorAll('.nav-btn');
  const partNum = document.getElementById('part-num');
  const rangeLabel = document.getElementById('range-label');
  const romanWords = ['One','Two','Three','Four'];

  frame.addEventListener('load', () => {
    frame.classList.add('loaded');
    loader.classList.add('hidden');
  });

  buttons.forEach((btn, idx) => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active')) return;
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      frame.classList.remove('loaded');
      loader.classList.remove('hidden');
      frame.src = btn.dataset.src;
      partNum.textContent = romanWords[idx];
      rangeLabel.textContent = 'Weeks ' + btn.dataset.range;
    });
  });
</script>
</body>
</html>
